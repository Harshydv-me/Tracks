services:
  # Backend Web Service
  - type: web
    name: skills-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run db:setup && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skills-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://skills-frontend.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-pro
      - key: NODE_VERSION
        value: 20

  # Frontend Static Site
  - type: web
    name: skills-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://skills-backend-5dbr.onrender.com/api
      - key: NODE_VERSION
        value: 20

databases:
  - name: skills-db
    plan: free
