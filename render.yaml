services:
  # Backend Web Service
  - type: web
    name: skills-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run db:setup && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skills-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        fromService:
          type: web
          name: skills-frontend
          property: url
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20

  # Frontend Static Site
  - type: web
    name: skills-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: skills-backend
          property: url
          suffix: /api
      - key: NODE_VERSION
        value: 20

databases:
  - name: skills-db
    plan: free
